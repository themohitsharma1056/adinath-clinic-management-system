<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<body>

<header th:fragment="navbar" class="header">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-lg-4">

                <div class="logo">

                    <img
                        src="/images/adinath-logo.svg"
                        alt="Adinath Logo"
                        class="site-logo">

                    <div class="logo-text">

                        <h1>ADINATH</h1>

                        <p>
                            Eye Care | Dental Clinic
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-lg-6">

                <nav class="nav-links">

                    <a th:href="@{/}">
                        Home
                    </a>

                    <a th:href="@{/about}">
                        About
                    </a>

                    <a th:href="@{/doctors}">
                        Doctors
                    </a>

                    <a th:href="@{/appointment}">
                        Appointment
                    </a>

                    <a th:href="@{/contact}">
                        Contact
                    </a>

                </nav>

            </div>

            <div class="col-lg-2">

                <div class="language-switch">

                    <button>
                        हिंदी
                    </button>

                    <button class="active">
                        English
                    </button>

                </div>

            </div>

        </div>

    </div>

</header>
</body>

</html>
